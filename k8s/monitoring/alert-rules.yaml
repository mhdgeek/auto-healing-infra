apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: flask-app-rules
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: flask-app-alerts
      interval: 30s
      rules:

        # ── Latence P99 > 2s ─────────────────────────────────────────────────
        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              rate(app_request_latency_seconds_bucket{endpoint="/work"}[5m])
            ) > 2
          for: 1m
          labels:
            severity: critical
            deployment: flask-app
            namespace: app
          annotations:
            summary: "P99 latency above 2s"
            description: "Latency is {{ $value | humanizeDuration }} on /work"

        # ── Taux d'erreurs > 10% ──────────────────────────────────────────────
        - alert: HighErrorRate
          expr: |
            rate(app_requests_total{status_code=~"5.."}[5m])
            /
            rate(app_requests_total[5m]) > 0.10
          for: 1m
          labels:
            severity: critical
            deployment: flask-app
            namespace: app
          annotations:
            summary: "Error rate above 10%"
            description: "{{ $value | humanizePercentage }} of requests failing"

        # ── App down ──────────────────────────────────────────────────────────
        - alert: AppDown
          expr: up{job="flask-app"} == 0
          for: 30s
          labels:
            severity: critical
            deployment: flask-app
            namespace: app
          annotations:
            summary: "Flask app is unreachable"
            description: "Prometheus cannot scrape the app"

        # ── Pod CrashLoopBackOff ──────────────────────────────────────────────
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{
              namespace="app", container="flask-app"
            }[15m]) * 60 * 15 > 3
          for: 1m
          labels:
            severity: critical
            deployment: flask-app
            namespace: app
          annotations:
            summary: "Pod is crash looping"
            description: "Pod {{ $labels.pod }} restarted more than 3 times in 15 minutes"
