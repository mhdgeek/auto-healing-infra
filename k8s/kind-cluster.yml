# Cluster Kind : 1 control-plane + 2 workers
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: auto-healing

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000   # NodePort pour l'app Flask
        hostPort: 30000
        protocol: TCP
      - containerPort: 30090   # NodePort pour Prometheus
        hostPort: 30090
        protocol: TCP
  - role: worker
  - role: worker
