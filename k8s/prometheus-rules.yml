apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: flask-app-rules
  namespace: monitoring
  labels:
    release: prometheus        # Must match kube-prometheus-stack label
spec:
  groups:
    - name: flask-app-alerts
      interval: 30s
      rules:

        # ─── High Latency ───────────────────────────────────────────────────
        - alert: FlaskHighLatency
          expr: |
            histogram_quantile(0.99,
              rate(app_request_latency_seconds_bucket{endpoint="/work"}[5m])
            ) > 2
          for: 1m
          labels:
            severity: critical
            app: flask-app
            namespace: app
          annotations:
            summary: "Flask P99 latency above 2s"
            description: "P99 latency is {{ $value | humanizeDuration }} on endpoint /work"

        # ─── High Error Rate ────────────────────────────────────────────────
        - alert: FlaskHighErrorRate
          expr: |
            rate(app_requests_total{status_code=~"5.."}[5m])
            /
            rate(app_requests_total[5m]) > 0.10
          for: 1m
          labels:
            severity: critical
            app: flask-app
            namespace: app
          annotations:
            summary: "Flask error rate above 10%"
            description: "{{ $value | humanizePercentage }} of requests are failing"

        # ─── Pod Down ───────────────────────────────────────────────────────
        - alert: FlaskAppDown
          expr: |
            kube_deployment_status_replicas_available{
              deployment="flask-app",
              namespace="app"
            } < 2
          for: 30s
          labels:
            severity: critical
            app: flask-app
            namespace: app
          annotations:
            summary: "Flask app has less than 2 replicas available"
            description: "Only {{ $value }} replicas are available"

        # ─── Pod CrashLooping ───────────────────────────────────────────────
        - alert: FlaskPodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{
              namespace="app"
            }[15m]) * 60 * 15 > 3
          for: 1m
          labels:
            severity: critical
            app: flask-app
            namespace: app
          annotations:
            summary: "Flask pod is crash looping"
            description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in 15 minutes"
