name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/${{ github.repository_owner }}/auto-healing-app
  IMAGE_HEALER: ghcr.io/${{ github.repository_owner }}/auto-healer

jobs:

  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest pytest-cov ruff
      - name: Lint with ruff
        run: ruff check app/ healer/
      - name: Run tests
        run: pytest tests/ -v --cov=app/app --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      app-tag: ${{ steps.meta-app.outputs.tags }}
      healer-tag: ${{ steps.meta-healer.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_APP }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - id: meta-healer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_HEALER }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
      - uses: docker/build-push-action@v5
        with:
          context: ./healer
          push: true
          tags: ${{ steps.meta-healer.outputs.tags }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy scan — Flask app
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_APP }}:latest
          format: sarif
          output: trivy-app.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - name: Trivy scan — Healer
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_HEALER }}:latest
          format: sarif
          output: trivy-healer.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-app.sarif

  deploy:
    name: Deploy & Smoke Test
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ci-cluster

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Build & load images into Kind
        run: |
          docker build -t auto-healing-app:local ./app
          docker build -t auto-healer:local ./healer
          kind load docker-image auto-healing-app:local --name ci-cluster
          kind load docker-image auto-healer:local --name ci-cluster

      - name: Deploy app (1 replica, no topology constraints)
        run: |
          kubectl apply -f k8s/namespaces.yml
          python3 - << 'EOF'
          import yaml, subprocess, sys

          with open("k8s/flask-app.yml") as f:
              docs = list(yaml.safe_load_all(f))

          for doc in docs:
              if not doc:
                  continue
              if doc.get("kind") == "Deployment":
                  doc["spec"]["replicas"] = 1
                  spec = doc["spec"]["template"]["spec"]
                  spec.pop("topologySpreadConstraints", None)
              if doc.get("kind") == "HorizontalPodAutoscaler":
                  doc["spec"]["minReplicas"] = 1

          result = yaml.dump_all(docs, default_flow_style=False)
          proc = subprocess.run(["kubectl", "apply", "-f", "-"],
                                input=result.encode(), capture_output=True)
          print(proc.stdout.decode())
          if proc.returncode != 0:
              print(proc.stderr.decode(), file=sys.stderr)
              sys.exit(proc.returncode)
          EOF

      - name: Wait for flask-app
        run: kubectl rollout status deployment/flask-app -n app --timeout=120s

      - name: Debug if failed
        if: failure()
        run: |
          kubectl get pods -n app -o wide
          kubectl describe pod -l app=flask-app -n app | tail -40
          kubectl logs -l app=flask-app -n app --tail=30 || true

      - name: Deploy auto-healer
        run: |
          kubectl apply -f k8s/healer-rbac.yml
          kubectl apply -f k8s/healer-deployment.yml
          kubectl patch deployment auto-healer -n app --type=json -p='[
            {"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/initialDelaySeconds","value":30},
            {"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/failureThreshold","value":10},
            {"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/initialDelaySeconds","value":20},
            {"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/failureThreshold","value":10}
          ]'
          kubectl rollout status deployment/auto-healer -n app --timeout=120s

      - name: Smoke test — Flask app
        run: |
          kubectl port-forward svc/flask-app 5001:80 -n app &
          sleep 5
          curl -sf http://localhost:5001/health
          curl -sf http://localhost:5001/metrics | grep app_requests_total
          echo "✅ Flask app smoke test passed"

      - name: Smoke test — Auto-healer
        run: |
          kubectl port-forward svc/auto-healer 8000:8000 -n app &
          sleep 5
          curl -sf http://localhost:8000/health
          curl -sf -X POST http://localhost:8000/alert \
            -H "Content-Type: application/json" \
            -d '{"alerts":[{"status":"firing","labels":{"alertname":"FlaskHighErrorRate","namespace":"app","severity":"critical"}}]}'
          echo "✅ Auto-healer smoke test passed"

      - name: Final pod status
        if: always()
        run: kubectl get pods -n app -o wide