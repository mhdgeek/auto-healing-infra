name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/${{ github.repository_owner }}/auto-healing-app
  IMAGE_HEALER: ghcr.io/${{ github.repository_owner }}/auto-healer

jobs:

  # ─── Job 1 : Lint + Tests ──────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint with ruff
        run: ruff check app/ healer/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app/app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─── Job 2 : Build + Push Docker images ───────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    outputs:
      app-tag: ${{ steps.meta-app.outputs.tags }}
      healer-tag: ${{ steps.meta-healer.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata — app
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_APP }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Extract metadata — healer
        id: meta-healer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_HEALER }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push Flask app image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}

      - name: Build & push Auto-healer image
        uses: docker/build-push-action@v5
        with:
          context: ./healer
          push: true
          tags: ${{ steps.meta-healer.outputs.tags }}
          labels: ${{ steps.meta-healer.outputs.labels }}

  # ─── Job 3 : Trivy Security Scan ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan — Flask app
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_APP }}:latest
          format: sarif
          output: trivy-app.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"           # Don't block, just report

      - name: Trivy scan — Auto-healer
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_HEALER }}:latest
          format: sarif
          output: trivy-healer.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-app.sarif

  # ─── Job 4 : Deploy to Kind (smoke test) ──────────────────────────────────
  deploy:
    name: Deploy & Smoke Test
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ci-cluster

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Build images locally for Kind
        run: |
          docker build -t auto-healing-app:local ./app
          docker build -t auto-healer:local ./healer
          kind load docker-image auto-healing-app:local --name ci-cluster
          kind load docker-image auto-healer:local --name ci-cluster

      - name: Deploy app to Kind
        run: |
          kubectl apply -f k8s/namespaces.yml
          kubectl apply -f k8s/flask-app.yml
          kubectl patch deployment flask-app -n app --type=json -p='[
            {"op":"replace","path":"/spec/replicas","value":1},
            {"op":"remove","path":"/spec/template/spec/topologySpreadConstraints"}
          ]'
          kubectl rollout status deployment/flask-app -n app --timeout=120s

      - name: Deploy auto-healer to Kind
        run: |
          kubectl apply -f k8s/healer-rbac.yml
          kubectl apply -f k8s/healer-deployment.yml
          kubectl patch deployment auto-healer -n app --type=json -p='[
            {"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/initialDelaySeconds","value":30},
            {"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/failureThreshold","value":10},
            {"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/initialDelaySeconds","value":20},
            {"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/failureThreshold","value":10}
          ]'
          kubectl rollout status deployment/auto-healer -n app --timeout=120s

      - name: Smoke test — Flask app
        run: |
          kubectl port-forward svc/flask-app 5001:80 -n app &
          sleep 5
          curl -sf http://localhost:5001/health
          curl -sf http://localhost:5001/metrics | grep app_requests_total
          echo "✅ Flask app smoke test passed"

      - name: Smoke test — Auto-healer
        run: |
          kubectl port-forward svc/auto-healer 8000:8000 -n app &
          sleep 5
          curl -sf http://localhost:8000/health
          curl -sf -X POST http://localhost:8000/alert \
            -H "Content-Type: application/json" \
            -d '{"alerts":[{"status":"firing","labels":{"alertname":"FlaskHighErrorRate","namespace":"app","severity":"critical"}}]}'
          echo "✅ Auto-healer smoke test passed"

      - name: Show final pod status
        if: always()
        run: kubectl get pods -n app -o wide
